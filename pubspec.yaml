name: meter_reader
description: "Petrol Station Meter Reading App for Managers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Environment Configuration
  flutter_dotenv: ^5.2.1

  # Connectivity
  connectivity_plus: ^6.1.0

  # Local Database
  sqflite: ^2.4.1

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_image_compress: ^2.3.0

  # OCR / Text Recognition
  google_mlkit_text_recognition: ^0.14.0

  # UI
  intl: ^0.19.0
  google_fonts: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.development
    - .env.production
